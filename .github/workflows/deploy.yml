name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        id: artifact
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run download --repo ${{ github.repository }} --name public --dir public/

      - name: Setup Go
        if: steps.artifact.outcome == 'failure'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Hugo
        if: steps.artifact.outcome == 'failure'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Build
        if: steps.artifact.outcome == 'failure'
        run: |
          hugo --gc --minify
          npx pagefind@1 --site public

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 5.189.155.226 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            public/ root@5.189.155.226:/opt/stack/site/
